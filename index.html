<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>嘉绢记忆 </title>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#f5ede4;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
            font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:20px;transition:background 0.6s ease;
        }
        body.drawing-bg{background:radial-gradient(ellipse at center,#f5e8d8,#ede0d0);animation:bgPulseLight 1.2s ease-in-out infinite alternate}
        body.ur-bg{background:radial-gradient(ellipse at center,#f0e0e8,#f5ede4);animation:bgUrPulseLight 0.8s ease-in-out infinite alternate}
        @keyframes bgPulseLight{0%{background:radial-gradient(ellipse at 40% 50%,#f5e8d8,#f0e4d8)}100%{background:radial-gradient(ellipse at 60% 50%,#f0e4d8,#ede0d0)}}
        @keyframes bgUrPulseLight{0%{background:radial-gradient(ellipse at 30% 50%,#f0e0e8,#f0e4d8,#f5ede4)}50%{background:radial-gradient(ellipse at 70% 50%,#f0e8e0,#f0e0e8,#f5ede4)}100%{background:radial-gradient(ellipse at 50% 50%,#f5e0e8,#f0e4d8,#f5ede4)}}
        .app{max-width:480px;width:100%;background:#fff;border-radius:40px;padding:30px 20px 40px;box-shadow:0 20px 60px rgba(0,0,0,.08);border:1px solid #e8ddd0;position:relative;z-index:2}
        .title{text-align:center;color:#3a2a22;font-size:22px;font-weight:700;letter-spacing:4px;margin-bottom:4px}
        .subtitle{text-align:center;color:#8a7a6a;font-size:12px;letter-spacing:6px;margin-bottom:24px}
        .progress{display:flex;justify-content:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
        .slot{width:40px;height:56px;background:#f5f0ea;border-radius:8px;border:2px dashed #d5c8b8;display:flex;align-items:center;justify-content:center;font-size:18px;color:#c0b0a0;transition:all 0.4s ease;position:relative}
        .slot .label{position:absolute;bottom:-18px;font-size:8px;color:#b0a090;white-space:nowrap}
        .slot.filled{border-color:#c9a87c;background:#f5ede4;color:#8a7a6a}
        .slot.filled-ur{border-color:#d4a84a;background:#f5ede4;color:#b8943a;box-shadow:0 0 20px rgba(200,170,80,.15);animation:glowPulseLight 1.5s ease-in-out infinite}
        .slot.ur-slot.filled-ur{border-image:linear-gradient(135deg,#d4a84a,#c88abc,#7ab8d4,#d4a84a)1;border-image-slice:1;animation:rainbowBorderLight 2s linear infinite}
        @keyframes glowPulseLight{0%,100%{box-shadow:0 0 20px rgba(200,170,80,.1)}50%{box-shadow:0 0 40px rgba(200,170,80,.25)}}
        @keyframes rainbowBorderLight{0%{border-color:#d4a84a}25%{border-color:#c88abc}50%{border-color:#7ab8d4}75%{border-color:#8ac88a}100%{border-color:#d4a84a}}
        .card-display{background:#faf5ee;border-radius:24px;padding:20px;margin-bottom:24px;min-height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid #e8ddd0;position:relative;overflow:hidden}
        .card-display .placeholder{color:#b0a090;font-size:14px;letter-spacing:2px;transition:opacity 0.3s ease}
        .card-display .placeholder.hidden{opacity:0}
        .particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;opacity:0;transition:opacity 0.3s ease}
        .particles.active{opacity:1}
        .particle{position:absolute;border-radius:50%;animation:particleFloat 2s ease-out forwards}
        @keyframes particleFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-300px) scale(0)}}
        .card-result{display:none;flex-direction:column;align-items:center;width:100%;position:relative;z-index:1}
        .card-result.show{display:flex}
        .card-result .card-frame{width:200px;height:280px;border-radius:16px;background:#f5f0ea;overflow:hidden;margin-bottom:10px;position:relative;border:3px solid #d5c8b8;transition:border 0.3s ease}
        .card-result .card-frame img{width:100%;height:100%;object-fit:cover;display:block}
        .card-result .card-frame.ur-frame{border:4px solid transparent;background-image:linear-gradient(#faf5ee,#faf5ee),linear-gradient(135deg,#d4a84a,#c88abc,#7ab8d4,#d4a84a);background-origin:padding-box,border-box;background-clip:padding-box,border-box;animation:rainbowBorderLight 2s linear infinite;box-shadow:0 0 60px rgba(200,170,80,.15)}
        .card-result .rarity-badge {font-size: 13px;padding: 4px 18px;border-radius: 20px;background: linear-gradient(135deg, #c88abc, #d4a84a);color: #ffffff;letter-spacing: 3px;margin-bottom: 10px;box-shadow: 0 0 40px rgba(200, 170, 80, 0.15);animation: urGlowLight 1.2s ease-in-out infinite alternate;display: none;white-space: nowrap;}
        .card-result .rarity-badge.show{display:inline-block}
        @keyframes urGlowLight{0%{box-shadow:0 0 20px rgba(200,170,80,.1)}100%{box-shadow:0 0 50px rgba(200,170,80,.3)}}
        .card-result .card-name{color:#3a2a22;font-size:20px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
        .card-result .card-story{color:#6a5a4a;font-size:14px;line-height:1.8;text-align:center;max-width:320px;padding:0 8px;margin-top:4px}
        .draw-section{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:8px}
        .draw-count-display{font-size:14px;color:#8a7a6a;letter-spacing:1px}
        .draw-count-display span{color:#8a6a4a;font-weight:700;font-size:18px}
        .draw-btn{width:100%;padding:18px;border:none;border-radius:60px;font-size:20px;font-weight:700;letter-spacing:6px;background:linear-gradient(135deg,#c9a87c,#b8945a);color:#fff;cursor:pointer;transition:all 0.2s ease;box-shadow:0 8px 30px rgba(200,170,120,.15);position:relative;z-index:2}
        .draw-btn:hover:not(:disabled){transform:scale(1.02);box-shadow:0 8px 40px rgba(200,170,120,.25)}
        .draw-btn:active:not(:disabled){transform:scale(0.97)}
        .draw-btn:disabled{opacity:0.5;transform:none;cursor:not-allowed;background:#d5c8b8;color:#b0a090}
        .reset-btn{width:100%;padding:12px;margin-top:12px;border:none;border-radius:60px;font-size:14px;font-weight:400;letter-spacing:4px;background:transparent;color:#b0a090;cursor:pointer;border:1px solid #e8ddd0;transition:all 0.2s ease}
        .reset-btn:hover{border-color:#d5c8b8;color:#8a7a6a}
        .bottom-bar{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:0 4px}
        .collection-status{color:#8a7a6a;font-size:13px;letter-spacing:1px}
        .collection-status span{color:#8a6a4a;font-weight:700}
        .celebrate{text-align:center;color:#b8943a;font-size:16px;font-weight:700;letter-spacing:4px;margin-top:12px;animation:urGlowLight 1s ease-in-out infinite alternate}
        .celebrate.hidden{display:none}
        .task-section{margin-top:28px;padding-top:20px;border-top:2px solid #e8ddd0}
        .task-section-title{color:#3a2a22;font-size:16px;font-weight:700;letter-spacing:3px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
        .task-section-title .badge{font-size:12px;font-weight:400;color:#b0a090;letter-spacing:1px}
        .task-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .task-item{background:#faf5ee;border-radius:16px;padding:16px 12px;text-align:center;border:2px solid #ede0d0;transition:all 0.3s ease;cursor:pointer;position:relative}
        .task-item:hover:not(.completed):not(.locked){border-color:#c9a87c;transform:translateY(-2px);box-shadow:0 4px 20px rgba(200,170,120,.10)}
        .task-item.completed{border-color:#8ac88a;background:#f0f8f0;cursor:pointer;opacity:0.85}
        .task-item.locked{opacity:0.5;cursor:not-allowed;filter:grayscale(0.3)}
        .task-item .task-icon{font-size:28px;display:block;margin-bottom:6px}
        .task-item .task-name{color:#3a2a22;font-size:13px;font-weight:600;letter-spacing:1px}
        .task-item .task-status{font-size:11px;color:#b0a090;margin-top:4px;display:block}
        .task-item.completed .task-status{color:#6aaa6a}
        .task-item .task-reward{font-size:10px;color:#c9a87c;margin-top:2px;display:block}
        .task-item .check-mark{position:absolute;top:6px;right:8px;font-size:18px;color:#6aaa6a;display:none}
        .task-item.completed .check-mark{display:block}
        .no-tasks-msg{text-align:center;color:#8a7a6a;font-size:14px;padding:20px 0;grid-column:1/-1}
        .gallery-section{margin-top:28px;padding-top:20px;border-top:2px solid #e8ddd0}
        .gallery-section-title{color:#3a2a22;font-size:16px;font-weight:700;letter-spacing:3px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
        .gallery-section-title .badge{font-size:12px;font-weight:400;color:#b0a090;letter-spacing:1px}
        .gallery-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
        .gallery-item{background:#faf5ee;border-radius:16px;padding:12px 8px 10px;text-align:center;border:2px solid #ede0d0;transition:all 0.3s ease;cursor:default;position:relative}
        .gallery-item.collected{border-color:#d5c8b8;cursor:pointer}
        .gallery-item.collected:hover{border-color:#c9a87c;transform:translateY(-4px);box-shadow:0 8px 30px rgba(200,170,120,.10)}
        .gallery-item.locked{opacity:0.4;filter:grayscale(0.6)}
        .gallery-item .thumb{width:100%;aspect-ratio:3/4;border-radius:10px;background:#f5f0ea;overflow:hidden;margin-bottom:6px}
        .gallery-item .thumb img{width:100%;height:100%;object-fit:cover;display:block}
        .gallery-item .thumb .lock-icon{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:28px;color:#d5c8b8}
        .gallery-item .gallery-card-name{color:#b0a090;font-size:11px;letter-spacing:0.5px;line-height:1.3}
        .gallery-item.collected .gallery-card-name{color:#3a2a22}
        .gallery-item .gallery-badge{font-size:9px;padding:1px 10px;border-radius:10px;background:#ede0d0;color:#b0a090;display:inline-block;margin-top:2px}
        .gallery-item.collected .gallery-badge{background:#ede0d0;color:#8a7a6a}
        .gallery-item .gallery-badge.ur-badge{background:linear-gradient(135deg,#c88abc,#d4a84a);color:#fff}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.40);backdrop-filter:blur(10px);z-index:1000;display:none;justify-content:center;align-items:center;padding:24px 20px}
        .modal-overlay.open{display:flex}
        .modal-box{max-width:400px;width:100%;max-height:92vh;background:#fff;border-radius:32px;padding:24px 24px 32px;border:1px solid #e8ddd0;box-shadow:0 30px 80px rgba(0,0,0,.20);animation:modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1);overflow-y:auto;display:flex;flex-direction:column;align-items:center}
        .modal-box::-webkit-scrollbar{width:3px}
        .modal-box::-webkit-scrollbar-thumb{background:#d5c8b8;border-radius:4px}
        @keyframes modalIn{0%{opacity:0;transform:scale(0.8) translateY(30px)}100%{opacity:1;transform:scale(1) translateY(0)}}
        .modal-box .modal-close{align-self:flex-end;background:transparent;border:none;color:#b0a090;font-size:28px;cursor:pointer;transition:color 0.2s ease;padding:0 4px 8px 0;line-height:1}
        .modal-box .modal-close:hover{color:#3a2a22}
        .modal-box .modal-image{width:100%;max-width:260px;aspect-ratio:3/4;border-radius:18px;overflow:hidden;background:#faf5ee;border:3px solid #d5c8b8;margin-bottom:14px;flex-shrink:0}
        .modal-box .modal-image img{width:100%;height:100%;object-fit:cover;display:block}
        .modal-box .modal-image.ur-border{border:4px solid transparent;background-image:linear-gradient(#faf5ee,#faf5ee),linear-gradient(135deg,#d4a84a,#c88abc,#7ab8d4,#d4a84a);background-origin:padding-box,border-box;background-clip:padding-box,border-box;animation:rainbowBorderLight 2s linear infinite}
        .modal-box .modal-name{color:#3a2a22;font-size:24px;font-weight:700;letter-spacing:3px;margin-bottom:2px;text-align:center}
        .modal-box .modal-rarity{font-size:13px;color:#b0a090;margin-bottom:12px;letter-spacing:2px}
        .modal-box .modal-rarity.rare{color:#b8943a}
        .modal-box .modal-story{color:#4a3a32;font-size:15px;line-height:2;text-align:left;width:100%;padding:12px 4px 0 4px;border-top:1px solid #e8ddd0;white-space:pre-wrap;word-break:break-word}
        .modal-box .modal-story .story-label{color:#b0a090;font-size:12px;letter-spacing:2px;display:block;margin-bottom:6px}
        .game-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);z-index:1100;display:none;justify-content:center;align-items:center;padding:0}
        .game-overlay.open{display:flex}
        .game-box{width:100%;height:100%;max-width:none;max-height:none;background:#f5ede4;border-radius:0;padding:8px 12px 12px 12px;border:none;box-shadow:none;animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);display:flex;flex-direction:column}
        .game-box .game-header{display:flex;justify-content:space-between;align-items:center;padding:4px 4px 8px 4px;flex-shrink:0}
        .game-box .game-header .game-title{font-size:18px;font-weight:700;color:#3a2a22;letter-spacing:2px}
        .game-box .game-header .game-close-btn{background:transparent;border:none;color:#b0a090;font-size:28px;cursor:pointer;transition:color 0.2s ease;padding:0 6px;line-height:1}
        .game-box .game-header .game-close-btn:hover{color:#3a2a22}
        .game-box iframe{width:100%;flex:1;min-height:0;border:none;border-radius:16px;background:#faf5ee;display:block}
        .toast{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);background:#fff;color:#3a2a22;padding:12px 30px;border-radius:40px;border:1px solid #e8ddd0;font-size:14px;letter-spacing:2px;opacity:0;transition:opacity 0.4s ease;pointer-events:none;z-index:999;box-shadow:0 10px 40px rgba(0,0,0,.10)}
        .toast.show{opacity:1}
    </style>
</head>
<body>

<div class="app" id="app">
    <div class="title">⚡ 嘉绢记忆 · 工业遗存</div>
    <div class="subtitle">— 百年同源 · 一卡一故事 —</div>

    <div class="progress" id="progressSlots">
        <div class="slot" data-index="0">?<span class="label">电机</span></div>
        <div class="slot" data-index="1">?<span class="label">劳模</span></div>
        <div class="slot" data-index="2">?<span class="label">锯齿屋</span></div>
        <div class="slot" data-index="3">?<span class="label">技术赛</span></div>
        <div class="slot" data-index="4">?<span class="label">大家庭</span></div>
        <div class="slot ur-slot" data-index="5">?<span class="label">百年同源</span></div>
    </div>

    <div class="card-display" id="cardDisplay">
        <div class="particles" id="particles"></div>
        <div class="placeholder" id="placeholder">👆 点击下方抽卡</div>
        <div class="card-result" id="cardResult">
            <div class="rarity-badge" id="rarityBadge">✦ 稀 有</div>
            <div class="card-frame" id="cardFrame">
                <img id="cardImage" src="" alt="卡牌" />
            </div>
            <div class="card-name" id="cardName">意大利电机</div>
            <div class="card-story" id="cardStory">一句话故事在这里</div>
        </div>
    </div>

    <div class="draw-section">
        <div class="draw-count-display">剩余抽卡次数：<span id="drawCountDisplay">2</span></div>
        <button class="draw-btn" id="drawBtn">抽 卡</button>
    </div>

    <button class="reset-btn" id="resetBtn">⟳ 重置全部进度</button>

    <div class="bottom-bar">
        <div class="collection-status">已收集 <span id="collectedCount">0</span> / 6</div>
        <div class="celebrate hidden" id="celebrateText">🎉 全图鉴达成！</div>
    </div>

    <div class="task-section" id="taskSection">
        <div class="task-section-title">🎯 解锁更多抽卡机会<span class="badge" id="taskBadge">已完成 0 / 4</span></div>
        <div class="task-grid" id="taskGrid"></div>
    </div>

    <div class="gallery-section">
        <div class="gallery-section-title">📖 嘉绢记忆图鉴<span class="badge" id="galleryBadge">0 / 6</span></div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <button class="modal-close" id="modalClose">✕</button>
        <div class="modal-image" id="modalImage"><img id="modalImg" src="" alt="卡牌" /></div>
        <div class="modal-name" id="modalName">卡牌名称</div>
        <div class="modal-rarity" id="modalRarity">普通</div>
        <div class="modal-story" id="modalStory"><span class="story-label">📖 故 事</span>完整故事内容</div>
    </div>
</div>

<div class="game-overlay" id="gameOverlay">
    <div class="game-box">
        <div class="game-header">
            <span class="game-title" id="gameTitle">🧵 游戏</span>
            <button class="game-close-btn" id="gameCloseBtn">✕</button>
        </div>
        <iframe id="gameIframe" src=""></iframe>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CARD_DATA=[{
    id:0,
    name:'意大利电机',
    isRare:false,
    story:'王云祥师傅指着电机说：这台意大利机器，我们拆了两个月才搞懂。',
    image:'https://pic1.imgdb.cn/item/6a47d3731f8fda9783dffeb1.jpg',
    probability:0.192
},{
    id:1,
    name:'劳动模范 · 嘉绢先锋',
    isRare:false,
    story:'1956到1988年，数十张奖状和证书，每一张都是一群人的青春和汗水。',
    image:'https://pic1.imgdb.cn/item/6a47d3731f8fda9783dffeb0.jpg',
    probability:0.192
},{
    id:2,
    name:'锯齿屋顶',
    isRare:false,
    story:'100米长的锯齿厂房，每一道棱都在说：这里曾经机器轰鸣，灯火通明。',
    image:'https://pic1.imgdb.cn/item/6a47d3731f8fda9783dffeb4.jpg',
    probability:0.192
},{
    id:3,
    name:'技术操作比赛',
    isRare:false,
    story:'保全科技术比武，王云祥拿过第一名。他说：手艺是练出来的，不是学出来的。',
    image:'https://pic1.imgdb.cn/item/6a47d3731f8fda9783dffeb5.jpg',
    probability:0.192
},{
    id:4,
    name:'厂区大家庭',
    isRare:false,
    story:'下了夜班，大家在水池边洗把脸聊聊天，谁家有事全厂都知道。',
    image:'https://pic1.imgdb.cn/item/6a47d3731f8fda9783dffeb3.jpg',
    probability:0.192
},{
    id:5,
    name:'百年同源',
    isRare:true,
    story:'1921，红船启航，嘉绢投产。革命的火种和实业的齿轮，从同一年转动到今天。',
    image:'https://pic1.imgdb.cn/item/6a47d3731f8fda9783dffeb2.jpg',
    probability:0.04
}];

const TASKS=[
    {id:0,name:'接线头',icon:'🧵',desc:'连接相同颜色，路径不交叉',reward:'+1 抽卡次数',file:'games/game_01_jiexian.html'},
    {id:1,name:'绕纱管',icon:'🌀',desc:'绕满纱线，体验纺织手感',reward:'+1 抽卡次数',file:'games/game_02_raosha.html'},
   {id:2,name:'调浆料',icon:'🪣',desc:'按配方调配经纱浆料',reward:'+1 抽卡次数',file:'games/game_03_tiaojiangliao.html'},
    {id:3,name:'拉闸送电',icon:'⚡',desc:'按顺序合闸，恢复供电',reward:'+1 抽卡次数',file:'games/game_04_lazha.html'}
];

const STORAGE_KEY='jiaxuan_data';
function getDefaultData(){return {drawCount:2,collected:[],tasks:[false,false,false,false]}}
function loadData(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return getDefaultData();const data=JSON.parse(raw);if(data.drawCount===undefined)data.drawCount=2;if(!data.collected)data.collected=[];if(!data.tasks||data.tasks.length!==4)data.tasks=[false,false,false,false];return data}catch{return getDefaultData()}}
function saveData(data){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
let state=loadData();

function getDrawCount(){return state.drawCount}
function setDrawCount(val){state.drawCount=Math.max(0,val);saveData(state);updateUI()}
function addDrawCount(delta){setDrawCount(getDrawCount()+delta)}
function isCollected(cardId){return state.collected.includes(cardId)}
function addCollected(cardId){if(!isCollected(cardId)){state.collected.push(cardId);saveData(state);updateUI();return true}return false}
function getCollectedCount(){return state.collected.length}
function isTaskDone(taskId){return state.tasks[taskId]===true}
function completeTask(taskId){if(state.tasks[taskId])return false;state.tasks[taskId]=true;saveData(state);updateUI();return true}
function getTaskProgress(){return state.tasks.filter(Boolean).length}
function isAllCollected(){return getCollectedCount()>=6}
function resetAll(){if(confirm('确定要重置全部进度吗？')){state=getDefaultData();saveData(state);cardResult.classList.remove('show');placeholder.classList.remove('hidden');cardFrame.style.transition='none';cardFrame.style.transform='scale(1)';cardFrame.style.opacity='1';setBgState('idle');particlesContainer.classList.remove('active');particlesContainer.innerHTML='';updateUI();showToast('已重置，重新开始收集')}}

const slots=document.querySelectorAll('.slot');
const placeholder=document.getElementById('placeholder');
const cardResult=document.getElementById('cardResult');
const rarityBadge=document.getElementById('rarityBadge');
const cardFrame=document.getElementById('cardFrame');
const cardImage=document.getElementById('cardImage');
const cardName=document.getElementById('cardName');
const cardStory=document.getElementById('cardStory');
const drawBtn=document.getElementById('drawBtn');
const resetBtn=document.getElementById('resetBtn');
const drawCountDisplay=document.getElementById('drawCountDisplay');
const collectedSpan=document.getElementById('collectedCount');
const toast=document.getElementById('toast');
const celebrateText=document.getElementById('celebrateText');
const particlesContainer=document.getElementById('particles');
const body=document.body;
const galleryGrid=document.getElementById('galleryGrid');
const galleryBadge=document.getElementById('galleryBadge');
const taskGrid=document.getElementById('taskGrid');
const taskBadge=document.getElementById('taskBadge');
const modalOverlay=document.getElementById('modalOverlay');
const modalClose=document.getElementById('modalClose');
const modalImg=document.getElementById('modalImg');
const modalImage=document.getElementById('modalImage');
const modalName=document.getElementById('modalName');
const modalRarity=document.getElementById('modalRarity');
const modalStory=document.getElementById('modalStory');
const gameOverlay=document.getElementById('gameOverlay');
const gameCloseBtn=document.getElementById('gameCloseBtn');
const gameIframe=document.getElementById('gameIframe');
const gameTitle=document.getElementById('gameTitle');

gameIframe.src='';
let particleTimer=null;
let isDrawing=false;

function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toast._timer);toast._timer=setTimeout(()=>toast.classList.remove('show'),2000)}

function spawnParticles(isUR){
    const container=particlesContainer;container.innerHTML='';container.classList.add('active');
    const count=isUR?40:20;
    const colors=isUR?['#d4a84a','#c88abc','#7ab8d4','#e8c88a','#f5d98a']:['#c9a87c','#b0a090','#d5c8b8'];
    for(let i=0;i<count;i++){
        const el=document.createElement('div');el.className='particle';
        const x=10+Math.random()*80,y=50+Math.random()*50;
        const size=isUR?4+Math.random()*6:3+Math.random()*4;
        const color=colors[Math.floor(Math.random()*colors.length)];
        const duration=1.2+Math.random()*1.5,delay=Math.random()*0.5;
        el.style.cssText=`left:${x}%;top:${y}%;width:${size}px;height:${size}px;background:${color};animation-duration:${duration}s;animation-delay:${delay}s;${isUR?`box-shadow:0 0 ${size*3}px ${color};`:''}`;
        container.appendChild(el);
    }
    clearTimeout(particleTimer);particleTimer=setTimeout(()=>{container.classList.remove('active');container.innerHTML=''},2500);
}

function setBgState(s){body.classList.remove('drawing-bg','ur-bg');if(s==='drawing')body.classList.add('drawing-bg');if(s==='ur')body.classList.add('ur-bg')}

function animateCard(card,callback){
    const isUR=card.isRare;const frame=cardFrame;const duration=isUR?1400:600;
    frame.style.transition='none';frame.style.transform=isUR?'scale(0.05) rotateY(180deg)':'scale(0.2)';frame.style.opacity='0';
    void frame.offsetWidth;
    frame.style.transition=`transform ${duration}ms cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s ease`;
    if(isUR){
        requestAnimationFrame(()=>{frame.style.transform='scale(0.6) rotateY(120deg)';frame.style.opacity='1'});
        setTimeout(()=>{frame.style.transform='scale(0.9) rotateY(60deg)'},350);
        setTimeout(()=>{frame.style.transform='scale(1.15) rotateY(15deg)'},650);
        setTimeout(()=>{frame.style.transform='scale(0.93) rotateY(5deg)'},900);
        setTimeout(()=>{frame.style.transform='scale(1.04) rotateY(0deg)'},1100);
        setTimeout(()=>{frame.style.transform='scale(1) rotateY(0deg)';if(callback)callback()},duration);
    }else{
        requestAnimationFrame(()=>{frame.style.transform='scale(1.12)';frame.style.opacity='1'});
        setTimeout(()=>{frame.style.transform='scale(0.95)'},250);
        setTimeout(()=>{frame.style.transform='scale(1)';if(callback)callback()},duration);
    }
}

function displayCard(card){
    const isUR=card.isRare;setBgState(isUR?'ur':'drawing');spawnParticles(isUR);
    if(isUR){rarityBadge.classList.add('show');rarityBadge.textContent='✦ 稀 有'}else{rarityBadge.classList.remove('show')}
    cardFrame.className='card-frame'+(isUR?' ur-frame':'');
    cardImage.src=card.image;cardImage.alt=card.name;cardName.textContent=card.name;cardStory.textContent=card.story;
    placeholder.classList.add('hidden');cardResult.classList.add('show');
    animateCard(card,()=>{if(isUR)showToast('✨✨ 稀有！百年同源出现！ ✨✨')});
    clearTimeout(window.bgTimer);window.bgTimer=setTimeout(()=>setBgState('idle'),3500);
}

function drawCard(){
    if(isDrawing)return;
    if(isAllCollected()){showToast('🎉 已集齐全部6张卡牌！');return}
    if(getDrawCount()<=0){showToast('😅 抽卡次数用完了，去完成任务解锁更多吧！');return}
    isDrawing=true;drawBtn.disabled=true;
    const available=[];for(let i=0;i<CARD_DATA.length;i++){if(!isCollected(i))available.push(i)}
    if(available.length===0){isDrawing=false;drawBtn.disabled=false;showToast('🎉 已集齐全部卡牌！');return}
    let card;const isRareHit=Math.random()<0.04;
    const rareAvailable=available.filter(i=>CARD_DATA[i].isRare);
    const commonAvailable=available.filter(i=>!CARD_DATA[i].isRare);
    if(isRareHit&&rareAvailable.length>0){card=CARD_DATA[rareAvailable[Math.floor(Math.random()*rareAvailable.length)]]}
    else if(commonAvailable.length>0){card=CARD_DATA[commonAvailable[Math.floor(Math.random()*commonAvailable.length)]]}
    else if(rareAvailable.length>0){card=CARD_DATA[rareAvailable[Math.floor(Math.random()*rareAvailable.length)]]}
    else{isDrawing=false;drawBtn.disabled=false;return}
    setDrawCount(getDrawCount()-1);addCollected(card.id);displayCard(card);updateUI();
    if(isAllCollected()){setTimeout(()=>{showToast('🎉🎉 全图鉴达成！百年同源，薪火不灭 🎉🎉')},1000)}
    else{if(!card.isRare){setTimeout(()=>showToast(`✨ 获得「${card.name}」`),400)}}
    setTimeout(()=>{isDrawing=false;drawBtn.disabled=false},800);
}

function renderGallery(){
    let html='';CARD_DATA.forEach((card,idx)=>{
        const collected=state.collected.includes(idx);const isUR=card.isRare;
        html+=`<div class="gallery-item ${collected?'collected':'locked'}" data-index="${idx}">
            <div class="thumb">${collected?`<img src="${card.image}" alt="${card.name}" />`:'<div class="lock-icon">🔒</div>'}</div>
            <div class="gallery-card-name">${collected?card.name:'???'}</div>
            <div class="gallery-badge ${isUR?'ur-badge':''}">${isUR?'✦ 稀有':'普通'}</div>
        </div>`;
    });
    galleryGrid.innerHTML=html;
    document.querySelectorAll('.gallery-item.collected').forEach(el=>{el.addEventListener('click',function(){openModal(parseInt(this.dataset.index))})});
}

function renderTasks(){
    const allCollected=isAllCollected();let html='';
    if(allCollected){html='<div class="no-tasks-msg">🎉 已集齐全部卡牌！感谢你的收集 🎉</div>'}
    else{TASKS.forEach((task,idx)=>{
        const done=isTaskDone(idx);
        html+=`<div class="task-item ${done?'completed':''}" data-task-id="${idx}">
            <span class="check-mark">✓</span><span class="task-icon">${task.icon}</span>
            <div class="task-name">${task.name}</div>
            <span class="task-status">${done?'✅ 已完成（可重玩）':task.desc}</span>
            <span class="task-reward">${done?'🎮 点击重玩':task.reward}</span>
        </div>`;
    });}
    taskGrid.innerHTML=html;
    document.querySelectorAll('.task-item').forEach(el=>{el.addEventListener('click',function(){openGame(parseInt(this.dataset.taskId))})});
    taskBadge.textContent=`已完成 ${getTaskProgress()} / 4`;
}

function openModal(idx){
    const card=CARD_DATA[idx];const isUR=card.isRare;
    modalImg.src=card.image;modalImg.alt=card.name;modalName.textContent=card.name;
    modalRarity.textContent=isUR?'✦ 稀 有':'普 通';modalRarity.className='modal-rarity'+(isUR?' rare':'');
    modalImage.className='modal-image'+(isUR?' ur-border':'');
    modalStory.innerHTML=`<span class="story-label">📖 故 事</span>${card.story}\n\n（完整故事持续补充中……）`;
    modalOverlay.classList.add('open');document.body.style.overflow='hidden';
}
function closeModal(){modalOverlay.classList.remove('open');document.body.style.overflow=''}

function openGame(taskId){
    const task=TASKS[taskId];gameTitle.textContent=task.icon+' '+task.name;
    gameIframe.src='';setTimeout(()=>{gameIframe.src=task.file},100);
    gameOverlay.classList.add('open');document.body.style.overflow='hidden';
}
function closeGame(){gameOverlay.classList.remove('open');document.body.style.overflow='';setTimeout(()=>{gameIframe.src=''},500)}

window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='taskComplete'){const taskId=e.data.taskId;if(taskId>=0&&taskId<4&&!isTaskDone(taskId)){completeTask(taskId);addDrawCount(1);showToast('🎉 任务完成！获得 1 次抽卡次数！');renderTasks()}}
    if(e.data&&e.data.type==='closeGame'){closeGame()}
});

function updateUI(){
    drawCountDisplay.textContent=getDrawCount();
    slots.forEach((slot,idx)=>{const ok=isCollected(idx);if(ok){if(idx===5){slot.classList.add('filled-ur');slot.textContent='🌟'}else{slot.classList.add('filled');slot.textContent='✦'}}else{slot.classList.remove('filled','filled-ur');slot.textContent='?'}});
    collectedSpan.textContent=getCollectedCount();galleryBadge.textContent=getCollectedCount()+' / 6';
    if(isAllCollected()){celebrateText.classList.remove('hidden');drawBtn.disabled=true;drawBtn.textContent='🎉 已集齐'}else{celebrateText.classList.add('hidden');if(getDrawCount()<=0){drawBtn.disabled=true;drawBtn.textContent='😅 次数用完了'}else{drawBtn.disabled=false;drawBtn.textContent='抽 卡'}}
    renderGallery();renderTasks();
}

drawBtn.addEventListener('click',drawCard);
resetBtn.addEventListener('click',resetAll);
modalClose.addEventListener('click',closeModal);
modalOverlay.addEventListener('click',function(e){if(e.target===this)closeModal()});
gameCloseBtn.addEventListener('click',closeGame);
gameOverlay.addEventListener('click',function(e){if(e.target===this)closeGame()});

updateUI();
</script>
</body>
</html>
