<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>拉闸送电</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5efe4;font-family:system-ui,sans-serif;padding:10px;text-align:center;touch-action:none;user-select:none;-webkit-user-select:none}
.title{color:#222;font-size:22px;margin:10px 0}
.subtitle{color:#888;font-size:14px;margin-bottom:10px}
#gameBox{position:relative;width:min(96vw,620px);height:min(78vh,550px);margin:0 auto;background:#2a2a2a;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.3);overflow:hidden;touch-action:none}
canvas{display:block;width:100%;height:100%}
.win-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:99;border-radius:14px}
.win-overlay.show{display:flex}
.win-box{background:#fffffff5;padding:30px 40px;border-radius:16px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.15);max-width:90%}
.win-title{font-size:36px;font-weight:bold;color:#34c72f;white-space:nowrap;margin-bottom:8px}
.win-subtitle{font-size:18px;color:#666;margin-bottom:20px}
.win-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.win-btns button{padding:10px 24px;border:none;border-radius:10px;font-size:16px;color:#fff;cursor:pointer}
.btn-continue{background:#34c72f}.btn-back{background:#d83080}
.btns{margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btns button{padding:10px 24px;border:none;border-radius:10px;font-size:16px;color:#fff;cursor:pointer}
#resetBtn{background:#d83080}
</style>
</head>
<body>
<div class="title">⚡ 拉闸送电</div>
<div class="subtitle" id="statusText">记住每个电闸的编号，然后按顺序合闸！</div>
<div id="gameBox"><canvas id="gameCanvas"></canvas>
  <div class="win-overlay" id="winOverlay">
    <div class="win-box">
      <div class="win-title">🎉 通电成功！</div>
      <div class="win-subtitle" id="winSubtitle">✨ 获得 +1 抽卡次数！</div>
      <div class="win-btns">
        <button class="btn-continue" id="btnContinue">继续玩</button>
        <button class="btn-back" id="btnBack">返回抽卡</button>
      </div>
    </div>
  </div>
</div>
<div class="btns"><button id="resetBtn">重置关卡</button></div>

<script>
const wrap=document.getElementById('gameBox'),canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const winOverlay=document.getElementById('winOverlay'),winSubtitle=document.getElementById('winSubtitle');
const statusText=document.getElementById('statusText');
const btnContinue=document.getElementById('btnContinue'),btnBack=document.getElementById('btnBack');

const TASK_ID=3;
function isTaskAlreadyCompleted(){try{const r=localStorage.getItem('jiaxuan_data');if(!r)return false;const d=JSON.parse(r);return d.tasks&&d.tasks[TASK_ID]===true}catch{return false}}
let hasCompletedOnce=isTaskAlreadyCompleted(),isWon=false;

const TOTAL=6;
const MEMORIZE_TIME=5;

let switches=[];
let nextNum=1;
let errorCount=0;
let gamePhase='memorize';
let phaseStartTime=0;
let sparkles=[];

// 错误反馈
let wrongFlash=null; // {x, y, time}

function resizeCanvas(){canvas.width=wrap.clientWidth*2;canvas.height=wrap.clientHeight*2;ctx.scale(2,2)}
window.addEventListener('resize',()=>{resizeCanvas();setupSwitches();draw()});
resizeCanvas();

function shuffle(arr){const c=[...arr];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}

function setupSwitches(){
  const w=wrap.clientWidth,h=wrap.clientHeight;
  const cols=3,rows=2,sw=100,sh=130;
  const gx=(w-cols*sw)/(cols+1),gy=(h-rows*sh)/(rows+1)+25;
  const nums=shuffle([1,2,3,4,5,6]);
  switches=[];
  for(let i=0;i<TOTAL;i++){
    const col=i%cols,row=Math.floor(i/cols);
    switches.push({
      x:gx+col*(sw+gx),y:gy+row*(sh+gy),w:sw,h:sh,num:nums[i],on:false
    });
  }
  nextNum=1;errorCount=0;sparkles=[];wrongFlash=null;
  gamePhase='memorize';phaseStartTime=Date.now();
}

function resetGame(){setupSwitches();isWon=false;winOverlay.classList.remove('show');statusText.textContent='记住每个电闸的编号，然后按顺序合闸！';draw()}

function getPos(e){const r=canvas.getBoundingClientRect();return{x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,y:(e.touches?e.touches[0].clientY:e.clientY)-r.top}}

function handleClick(pos){
  if(isWon||gamePhase==='memorize')return;
  for(const s of switches){
    if(!s.on&&pos.x>=s.x&&pos.x<=s.x+s.w&&pos.y>=s.y&&pos.y<=s.y+s.h){
      if(s.num===nextNum){
        // 正确！
        s.on=true;nextNum++;spawnSparks(s.x+s.w/2,s.y+s.h/2);
        if(nextNum>TOTAL){isWon=true;onWin()}
      }else{
        // 错误！显示红色叉号
        errorCount++;
        wrongFlash={x:s.x+s.w/2, y:s.y+s.h/2, time:Date.now()};
      }
      draw();return;
    }
  }
}

canvas.addEventListener('click',e=>handleClick(getPos(e)));
canvas.addEventListener('touchstart',e=>{e.preventDefault();handleClick(getPos(e))},{passive:false});

function spawnSparks(x,y){for(let i=0;i<10;i++)sparkles.push({x,y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-4,life:1,size:2+Math.random()*4,color:'#ffdd00'})}
function updateSparkles(){for(const s of sparkles){s.x+=s.vx;s.y+=s.vy;s.life-=0.03}sparkles=sparkles.filter(s=>s.life>0)}

function draw(){
  ctx.clearRect(0,0,wrap.clientWidth,wrap.clientHeight);
  const w=wrap.clientWidth,h=wrap.clientHeight;
  
  // 背景
  ctx.fillStyle='#3a3a3a';ctx.fillRect(0,0,w,h);
  for(let y=0;y<h;y+=6){ctx.fillStyle='#404040';ctx.fillRect(0,y,w,2)}
  
  ctx.fillStyle='#aaa';ctx.font='bold 18px system-ui';ctx.textAlign='center';
  ctx.fillText('⚡ 配电柜 CONTROL PANEL',w/2,24);
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(10,32);ctx.lineTo(w-10,32);ctx.stroke();
  
  // 电闸
  switches.forEach(s=>{
    const{x,y,w:sw,h:sh,num,on}=s,cx=x+sw/2;
    
    // 面板底色
    ctx.fillStyle='#505050';ctx.beginPath();ctx.roundRect(x,y,sw,sh,8);ctx.fill();
    ctx.strokeStyle='#666';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(x,y,sw,sh,8);ctx.stroke();
    
    // 编号
    if(gamePhase==='memorize'||on){
      ctx.fillStyle='#fff';ctx.font='bold 30px system-ui';ctx.textAlign='center';
      ctx.fillText(num,cx,y+40);
    } else {
      ctx.fillStyle='#777';ctx.font='bold 24px system-ui';ctx.textAlign='center';
      ctx.fillText('?',cx,y+40);
    }
    
    // 闸刀
    const slotY=y+50,slotH=sh-62;
    ctx.fillStyle='#222';ctx.beginPath();ctx.roundRect(cx-8,slotY,16,slotH,3);ctx.fill();
    const handleY=on?slotY+slotH-14:slotY+4;
    ctx.fillStyle=on?'#34c72f':'#cc3333';
    ctx.beginPath();ctx.roundRect(cx-20,handleY,40,20,5);ctx.fill();
    ctx.strokeStyle=on?'#2a9e25':'#992222';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(cx-20,handleY,40,20,5);ctx.stroke();
    
    // 指示灯
    ctx.fillStyle=on?'#34c72f':'#444';ctx.beginPath();ctx.arc(cx,y+sh-16,7,0,Math.PI*2);ctx.fill();
    if(on){ctx.fillStyle='rgba(52,199,47,0.3)';ctx.beginPath();ctx.arc(cx,y+sh-16,12,0,Math.PI*2);ctx.fill()}
  });
  
  // 错误叉号动画
  if(wrongFlash&&Date.now()-wrongFlash.time<600){
    const elapsed=Date.now()-wrongFlash.time;
    const alpha=Math.max(0,1-elapsed/600);
    const scale=1+(elapsed<200?elapsed/200*0.3:0.3);
    ctx.save();
    ctx.translate(wrongFlash.x,wrongFlash.y);
    ctx.scale(scale,scale);
    ctx.strokeStyle=`rgba(255,50,50,${alpha})`;
    ctx.lineWidth=5;
    ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-25,-25);ctx.lineTo(25,25);ctx.stroke();
    ctx.beginPath();ctx.moveTo(25,-25);ctx.lineTo(-25,25);ctx.stroke();
    ctx.fillStyle=`rgba(255,50,50,${alpha*0.3})`;
    ctx.beginPath();ctx.arc(0,0,35,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  
  // 记忆阶段大提示
  if(gamePhase==='memorize'){
    const remain=Math.ceil(MEMORIZE_TIME-(Date.now()-phaseStartTime)/1000);
    
    // 半透明遮罩横幅
    const bannerY=50,bannerH=50;
    ctx.fillStyle='rgba(0,0,0,0.85)';
    ctx.beginPath();ctx.roundRect(w*0.05,bannerY,w*0.9,bannerH,12);ctx.fill();
    ctx.strokeStyle='#ffdd00';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(w*0.05,bannerY,w*0.9,bannerH,12);ctx.stroke();
    
    ctx.fillStyle='#ffdd00';ctx.font='bold 20px system-ui';ctx.textAlign='center';
    ctx.fillText(`⏱ 记住每个编号的位置！还剩 ${Math.max(0,remain)} 秒`,w/2,bannerY+32);
    
    if(Date.now()-phaseStartTime>MEMORIZE_TIME*1000){
      gamePhase='operate';
      statusText.textContent='凭记忆按1→2→3→4→5→6顺序合闸！';
    }
  }else if(!isWon){
    // 操作阶段提示
    const bannerY=50,bannerH=40;
    ctx.fillStyle='rgba(0,0,0,0.8)';
    ctx.beginPath();ctx.roundRect(w*0.1,bannerY,w*0.8,bannerH,10);ctx.fill();
    ctx.strokeStyle=nextNum<=3?'#ffdd00':'#ff9900';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(w*0.1,bannerY,w*0.8,bannerH,10);ctx.stroke();
    
    ctx.fillStyle='#fff';ctx.font='bold 18px system-ui';ctx.textAlign='center';
    ctx.fillText(`👉 请合上编号 ${nextNum} 的电闸`,w/2,bannerY+28);
    
    // 底部失误计数
    if(errorCount>0){
      ctx.fillStyle='rgba(255,80,80,0.9)';ctx.font='bold 14px system-ui';
      ctx.fillText(`⚠ 失误 ${errorCount} 次`,w/2,h-20);
    }
  }
  
  // 火花
  updateSparkles();
  for(const s of sparkles){ctx.fillStyle=`rgba(255,200,50,${s.life})`;ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill()}
  
  if(isWon)return;
  requestAnimationFrame(draw);
}

function onWin(){
  if(!hasCompletedOnce){hasCompletedOnce=true;window.parent.postMessage({type:'taskComplete',taskId:TASK_ID},'*');winSubtitle.textContent='✨ 获得 +1 抽卡次数！'}
  else{winSubtitle.textContent='🔄 重玩通关'}
  winOverlay.classList.add('show');statusText.textContent='全部电闸合闸完成！';
}

btnContinue.addEventListener('click',()=>{resetGame();draw()});
btnBack.addEventListener('click',()=>{window.parent.postMessage({type:'closeGame'},'*')});
document.getElementById('resetBtn').addEventListener('click',()=>{hasCompletedOnce=isTaskAlreadyCompleted();resetGame();draw()});

setupSwitches();draw();
</script>
</body>
</html>
