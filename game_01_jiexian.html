<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>接线头</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#f5efe4;
  font-family:system-ui,sans-serif;
  padding:10px;
  text-align:center;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}
.title{color:#222;font-size:22px;margin:10px 0}
.subtitle{color:#888;font-size:14px;margin-bottom:10px}
#gameBox{
  position:relative;
  width:min(96vw,620px);
  height:min(82vh,600px);
  margin:0 auto;
  background:#faf5ee;
  border-radius:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  overflow:hidden;
  touch-action:none;
}
#gridCanvas{position:absolute;top:0;left:0;width:100%;height:100%}
.dot{
  position:absolute;
  width:48px;height:48px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  border:3px solid #fff;
  z-index:10;
  touch-action:none;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,.15);
}
.dot.blue{background:linear-gradient(135deg,#4da6ff,#007aff)}
.dot.red{background:linear-gradient(135deg,#ff4d6a,#e02041)}
.dot.yellow{background:linear-gradient(135deg,#ffe04d,#ffcc00)}
.dot.green{background:linear-gradient(135deg,#5cd65c,#34c72f)}
.startDot{pointer-events:auto}

.dot::after{
  content:'';
  position:absolute;
  top:50%;left:50%;
  width:14px;height:14px;
  border-radius:50%;
  background:#fff;
  transform:translate(-50%,-50%);
  box-shadow:inset 0 1px 2px rgba(0,0,0,.15);
}

.btns{
  margin-top:18px;
  display:flex;gap:10px;
  justify-content:center;flex-wrap:wrap;
}
.btns button{
  padding:10px 24px;border:none;border-radius:10px;
  font-size:16px;color:#fff;cursor:pointer;
}
#resetBtn{background:#d83080}
#clearBtn{background:#3088ff}

.win-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.3);display:none;
  justify-content:center;align-items:center;z-index:99;border-radius:14px;
}
.win-overlay.show{display:flex}
.win-box{
  background:#fffffff5;padding:30px 40px;border-radius:16px;
  text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.15);max-width:90%;
}
.win-title{font-size:36px;font-weight:bold;color:#34c72f;white-space:nowrap;margin-bottom:8px}
.win-subtitle{font-size:18px;color:#666;margin-bottom:20px}
.win-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.win-btns button{padding:10px 24px;border:none;border-radius:10px;font-size:16px;color:#fff;cursor:pointer}
.btn-continue{background:#34c72f}.btn-back{background:#d83080}
</style>
</head>
<body>
<div class="title">🧵 接线头</div>
<div class="subtitle">连接相同颜色的线头，路径不能交叉</div>
<div id="gameBox">
  <canvas id="gridCanvas"></canvas>
  <div class="win-overlay" id="winOverlay">
    <div class="win-box">
      <div class="win-title">🎉 通关完成！</div>
      <div class="win-subtitle" id="winSubtitle">✨ 获得 +1 抽卡次数！</div>
      <div class="win-btns">
        <button class="btn-continue" id="btnContinue">继续玩</button>
        <button class="btn-back" id="btnBack">返回抽卡</button>
      </div>
    </div>
  </div>
</div>
<div class="btns">
  <button id="resetBtn">重置关卡</button>
  <button id="clearBtn">清空线条</button>
</div>

<script>
const wrap=document.getElementById('gameBox'),canvas=document.getElementById('gridCanvas'),ctx=canvas.getContext('2d');
const winOverlay=document.getElementById('winOverlay'),winSubtitle=document.getElementById('winSubtitle');
const btnContinue=document.getElementById('btnContinue'),btnBack=document.getElementById('btnBack');

const COLS=6,ROWS=5,PADDING=35;

const TASK_ID=0;
function isTaskAlreadyCompleted(){try{const r=localStorage.getItem('jiaxuan_data');if(!r)return false;const d=JSON.parse(r);return d.tasks&&d.tasks[TASK_ID]===true}catch{return false}}

let dots=[],paths=[],dragStartDot=null,tempPath=[],isDragging=false;
let hasCompletedOnce=isTaskAlreadyCompleted();

const colorList=['blue','red','yellow','green'];
const colorMap={
  blue:'#007aff',red:'#e02041',yellow:'#ffcc00',green:'#34c72f'
};
const colorLight={
  blue:'#80bfff',red:'#ff8099',yellow:'#ffe680',green:'#80e080'
};
const colorDark={
  blue:'#0055b3',red:'#b3152e',yellow:'#b38f00',green:'#248f24'
};

// 纱线纹理缓存
const textureCache={};

function getCellCenter(col,row){
  const iw=canvas.width-PADDING*2,ih=canvas.height-PADDING*2;
  return{x:PADDING+col*(iw/(COLS-1)),y:PADDING+row*(ih/(ROWS-1))};
}

function shuffleArray(arr){const c=[...arr];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}
const dirs=[{c:0,r:-1},{c:0,r:1},{c:-1,r:0},{c:1,r:0}];

function createSinglePath(usedGrid){
  let start;do{start={c:Math.floor(Math.random()*COLS),r:Math.floor(Math.random()*ROWS)}}while(usedGrid.has(`${start.c},${start.r}`));
  usedGrid.add(`${start.c},${start.r}`);
  const path=[start];let cur=start;
  const targetLen=7+Math.floor(Math.random()*5);
  while(path.length<targetLen){
    const shufDir=shuffleArray(dirs);let find=false;
    for(const d of shufDir){
      const nc=cur.c+d.c,nr=cur.r+d.r;
      if(nc>=0&&nc<COLS&&nr>=0&&nr<ROWS&&!usedGrid.has(`${nc},${nr}`)){cur={c:nc,r:nr};path.push(cur);usedGrid.add(`${nc},${nr}`);find=true;break}
    }
    if(!find)break;
  }
  return path;
}

function generateLevelPoints(){
  const used=new Set(),pointList=[];
  for(const color of colorList){
    const fullPath=createSinglePath(used);
    const p1=fullPath[0],p2=fullPath[fullPath.length-1];
    if(Math.abs(p1.c-p2.c)+Math.abs(p1.r-p2.r)<4)return generateLevelPoints();
    pointList.push({col:p1.c,row:p1.r,color},{col:p2.c,row:p2.r,color});
  }
  return pointList;
}

function getDotAt(col,row){return dots.find(d=>d.col===col&&d.row===row)}
function isCellBlocked(col,row,skipColor){
  for(const p of paths){if(p.color===skipColor)continue;if(p.points.some(pt=>pt.col===col&&pt.row===row))return true}
  return false;
}
function isWholePathCrossOtherLine(pathArr,color){for(const pt of pathArr){if(isCellBlocked(pt.col,pt.row,color))return true}return false}

function setupDots(){
  wrap.querySelectorAll('.dot').forEach(el=>el.remove());
  paths=[];tempPath=[];dragStartDot=null;isDragging=false;
  const levelPoints=generateLevelPoints();dots=[];
  levelPoints.forEach(d=>{
    const div=document.createElement('div');div.className=`dot ${d.color}`;
    const c=getCellCenter(d.col,d.row);
    div.style.left=c.x+'px';div.style.top=c.y+'px';
    wrap.appendChild(div);
    const dotObj={col:d.col,row:d.row,color:d.color,el:div};
    dots.push(dotObj);
    div.onclick=()=>removePathByColor(d.color);
    div.onmousedown=e=>{e.preventDefault();startDrag(dotObj)};
    div.ontouchstart=e=>{e.preventDefault();startDrag(dotObj)};
  });
  refreshDotInteraction();winOverlay.classList.remove('show');renderAll();
}

function removePathByColor(color){paths=paths.filter(p=>p.color!==color);refreshDotInteraction();renderAll();checkWin()}

function refreshDotInteraction(){
  dots.forEach(d=>{const exist=paths.find(p=>p.color===d.color);if(exist)d.el.classList.remove('startDot');else d.el.classList.add('startDot')});
}

function resizeGame(){canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;setupDots()}
window.addEventListener('resize',resizeGame);resizeGame();

function startDrag(dot){dragStartDot=dot;tempPath=[{col:dot.col,row:dot.row}];isDragging=true}

function stopDrag(){
  if(!isDragging)return;
  const endPos=tempPath[tempPath.length-1];
  const targetDot=getDotAt(endPos.col,endPos.row);
  if(tempPath.length>1&&targetDot&&targetDot.color===dragStartDot.color&&targetDot!==dragStartDot){
    if(!isWholePathCrossOtherLine(tempPath,dragStartDot.color)){paths.push({color:dragStartDot.color,points:[...tempPath]});refreshDotInteraction();checkWin()}
  }
  dragStartDot=null;tempPath=[];isDragging=false;renderAll();
}

function getGridPos(e){
  const rect=canvas.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
  const x=cx-rect.left,y=cy-rect.top;
  const iw=canvas.width-PADDING*2,ih=canvas.height-PADDING*2;
  const relX=Math.max(0,Math.min(iw,x-PADDING)),relY=Math.max(0,Math.min(ih,y-PADDING));
  let col=Math.round(relX/(iw/(COLS-1))),row=Math.round(relY/(ih/(ROWS-1)));
  col=Math.max(0,Math.min(COLS-1,col));row=Math.max(0,Math.min(ROWS-1,row));
  return{col,row};
}

canvas.addEventListener('mousemove',dragMove);
canvas.addEventListener('touchmove',e=>{e.preventDefault();dragMove(e)});
function dragMove(e){
  if(!isDragging||!dragStartDot)return;
  const pos=getGridPos(e),last=tempPath[tempPath.length-1];
  const dc=Math.abs(pos.col-last.col),dr=Math.abs(pos.row-last.row);
  if(!((dc===1&&dr===0)||(dc===0&&dr===1)))return;
  const existIdx=tempPath.findIndex(p=>p.col===pos.col&&p.row===pos.row);
  if(existIdx!==-1){tempPath=tempPath.slice(0,existIdx+1);renderAll();return}
  if(isCellBlocked(pos.col,pos.row,dragStartDot.color)){tempPath=[];renderAll();return}
  const hitDot=getDotAt(pos.col,pos.row);
  if(hitDot&&hitDot.color!==dragStartDot.color){tempPath=[];renderAll();return}
  tempPath.push(pos);renderAll();
}

window.addEventListener('mouseup',stopDrag);
canvas.addEventListener('mouseleave',stopDrag);
canvas.addEventListener('touchend',stopDrag);
canvas.addEventListener('touchcancel',stopDrag);

// ============ 绘制纱线纹理 ============
function drawYarnLine(points,color,alpha){
  if(points.length<2)return;
  const baseColor=colorMap[color];
  const lightColor=colorLight[color];
  const darkColor=colorDark[color];
  
  // 主线——带渐变描边模拟立体感
  ctx.save();
  ctx.globalAlpha=alpha||1;
  
  // 外阴影
  ctx.beginPath();ctx.lineWidth=20;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=darkColor+'44';
  points.forEach((p,i)=>{const c=getCellCenter(p.col,p.row);if(i===0)ctx.moveTo(c.x,c.y+2);else ctx.lineTo(c.x,c.y+2)});
  ctx.stroke();
  
  // 主线条
  ctx.beginPath();ctx.lineWidth=14;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=darkColor;
  points.forEach((p,i)=>{const c=getCellCenter(p.col,p.row);if(i===0)ctx.moveTo(c.x,c.y);else ctx.lineTo(c.x,c.y)});
  ctx.stroke();
  
  // 中间亮色
  ctx.beginPath();ctx.lineWidth=8;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=baseColor;
  points.forEach((p,i)=>{const c=getCellCenter(p.col,p.row);if(i===0)ctx.moveTo(c.x,c.y);else ctx.lineTo(c.x,c.y)});
  ctx.stroke();
  
  // 高光线
  ctx.beginPath();ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=lightColor;
  points.forEach((p,i)=>{const c=getCellCenter(p.col,p.row);if(i===0)ctx.moveTo(c.x,c.y-2);else ctx.lineTo(c.x,c.y-2)});
  ctx.stroke();
  
  // 纱线纹理——细小横纹
  ctx.beginPath();ctx.lineWidth=14;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=baseColor;
  points.forEach((p,i)=>{const c=getCellCenter(p.col,p.row);if(i===0)ctx.moveTo(c.x,c.y);else ctx.lineTo(c.x,c.y)});
  ctx.stroke();
  ctx.clip(); // 裁剪到线条范围内
  
  // 在裁剪区域内画横纹
  for(const pt of points){
    const c=getCellCenter(pt.col,pt.row);
    for(let j=-8;j<=8;j+=4){
      ctx.fillStyle=darkColor+'22';
      ctx.fillRect(c.x-3,c.y+j-0.5,6,1);
      ctx.fillStyle=lightColor+'22';
      ctx.fillRect(c.x-3,c.y+j+1.5,6,1);
    }
  }
  
  ctx.restore();
}

// 绘制临时拖拽线
function drawTempLine(points,color){
  if(points.length<2)return;
  const baseColor=colorMap[color];
  const lightColor=colorLight[color];
  
  ctx.save();ctx.globalAlpha=0.7;
  
  // 虚线引导
  ctx.beginPath();ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.setLineDash([6,4]);
  ctx.strokeStyle=baseColor;
  points.forEach((p,i)=>{const c=getCellCenter(p.col,p.row);if(i===0)ctx.moveTo(c.x,c.y);else ctx.lineTo(c.x,c.y)});
  ctx.stroke();
  ctx.setLineDash([]);
  
  // 半透明主线
  ctx.beginPath();ctx.lineWidth=12;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=baseColor+'66';
  points.forEach((p,i)=>{const c=getCellCenter(p.col,p.row);if(i===0)ctx.moveTo(c.x,c.y);else ctx.lineTo(c.x,c.y)});
  ctx.stroke();
  
  // 亮点
  ctx.beginPath();ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=lightColor+'99';
  points.forEach((p,i)=>{const c=getCellCenter(p.col,p.row);if(i===0)ctx.moveTo(c.x,c.y-2);else ctx.lineTo(c.x,c.y-2)});
  ctx.stroke();
  
  ctx.restore();
}

function renderAll(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const iw=canvas.width-PADDING*2,ih=canvas.height-PADDING*2;
  
  // 网格背景
  ctx.strokeStyle='#e8ddd0';ctx.lineWidth=1;ctx.setLineDash([2,4]);
  for(let c=0;c<COLS;c++){const x=PADDING+c*(iw/(COLS-1));ctx.beginPath();ctx.moveTo(x,PADDING);ctx.lineTo(x,canvas.height-PADDING);ctx.stroke()}
  for(let r=0;r<ROWS;r++){const y=PADDING+r*(ih/(ROWS-1));ctx.beginPath();ctx.moveTo(PADDING,y);ctx.lineTo(canvas.width-PADDING,y);ctx.stroke()}
  ctx.setLineDash([]);
  
  // 网格交点小圆点装饰
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS;r++){
      const center=getCellCenter(c,r);
      ctx.fillStyle='#e8ddd0';ctx.beginPath();ctx.arc(center.x,center.y,3,0,Math.PI*2);ctx.fill();
    }
  }
  
  // 已完成的线
  paths.forEach(line=>drawYarnLine(line.points,line.color,1));
  
  // 拖拽中的临时线
  if(isDragging&&dragStartDot&&tempPath.length>1){
    drawTempLine(tempPath,dragStartDot.color);
  }
}

function checkWin(){
  if(paths.length===4){
    if(!hasCompletedOnce){hasCompletedOnce=true;window.parent.postMessage({type:'taskComplete',taskId:TASK_ID},'*');winSubtitle.textContent='✨ 获得 +1 抽卡次数！'}
    else{winSubtitle.textContent='🔄 重玩通关'}
    winOverlay.classList.add('show');
  }else{winOverlay.classList.remove('show')}
}

btnContinue.addEventListener('click',()=>{winOverlay.classList.remove('show');setupDots()});
btnBack.addEventListener('click',()=>{window.parent.postMessage({type:'closeGame'},'*')});

document.getElementById('clearBtn').addEventListener('click',()=>{
  paths=[];tempPath=[];dragStartDot=null;isDragging=false;
  winOverlay.classList.remove('show');refreshDotInteraction();renderAll();
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  paths=[];tempPath=[];dragStartDot=null;isDragging=false;
  hasCompletedOnce=isTaskAlreadyCompleted();winOverlay.classList.remove('show');
  refreshDotInteraction();setupDots();
});
</script>
</body>
</html>
