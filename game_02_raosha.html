<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>绕纱管</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#f5efe4;
  font-family:system-ui,sans-serif;
  padding:10px;
  text-align:center;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}
.title{
  color:#222;
  font-size:22px;
  margin:10px 0;
}
.subtitle{
  color:#888;
  font-size:14px;
  margin-bottom:10px;
}
#gameBox{
  position:relative;
  width:min(96vw,620px);
  height:min(78vh,580px);
  margin:0 auto;
  background:#fffaf0;
  border-radius:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  overflow:hidden;
  touch-action:none;
}
canvas{
  display:block;
  width:100%;
  height:100%;
}

.win-overlay{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99;
  border-radius:14px;
}
.win-overlay.show{display:flex;}
.win-box{
  background:#fffffff5;
  padding:30px 40px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  max-width:90%;
}
.win-box .win-title{
  font-size:36px;
  font-weight:bold;
  color:#34c72f;
  white-space:nowrap;
  margin-bottom:8px;
}
.win-box .win-subtitle{
  font-size:18px;
  color:#666;
  margin-bottom:20px;
}
.win-box .win-btns{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}
.win-box .win-btns button{
  padding:10px 24px;
  border:none;
  border-radius:10px;
  font-size:16px;
  color:#fff;
  cursor:pointer;
}
.btn-continue{background:#34c72f;}
.btn-back{background:#d83080;}

.btns{
  margin-top:16px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}
.btns button{
  padding:10px 24px;
  border:none;
  border-radius:10px;
  font-size:16px;
  color:#fff;
  cursor:pointer;
}
#resetBtn{background:#d83080;}
</style>
</head>
<body>
<div class="title">🌀 绕纱管</div>
<div class="subtitle">按住纱管绕圈，绕满纱线即可完成</div>
<div id="gameBox">
  <canvas id="gameCanvas"></canvas>
  <div class="win-overlay" id="winOverlay">
    <div class="win-box">
      <div class="win-title">🎉 通关完成！</div>
      <div class="win-subtitle" id="winSubtitle">✨ 获得 +1 抽卡次数！</div>
      <div class="win-btns">
        <button class="btn-continue" id="btnContinue">继续玩</button>
        <button class="btn-back" id="btnBack">返回抽卡</button>
      </div>
    </div>
  </div>
</div>
<div class="btns">
  <button id="resetBtn">重置关卡</button>
</div>

<script>
const wrap = document.getElementById('gameBox');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const winOverlay = document.getElementById('winOverlay');
const winSubtitle = document.getElementById('winSubtitle');
const btnContinue = document.getElementById('btnContinue');
const btnBack = document.getElementById('btnBack');

// ★ 读取主框架存储，判断该任务是否已完成
const TASK_ID = 1; // 绕纱管是 taskId=1
function isTaskAlreadyCompleted(){
  try {
    const raw = localStorage.getItem('jiaxuan_data');
    if(!raw) return false;
    const data = JSON.parse(raw);
    return data.tasks && data.tasks[TASK_ID] === true;
  } catch {
    return false;
  }
}

let hasCompletedOnce = isTaskAlreadyCompleted();
let isWon = false;

let bobbinX, bobbinY, bobbinRadius, bobbinHeight;
let flangeRadius;

const TOTAL_WRAPS = 30;
let wrapProgress = 0;
let totalAngle = 0;

let isTouching = false;
let lastAngle = 0;
let touchStartAngle = 0;
let touchId = null;

let sparkles = [];

function resizeCanvas(){
  canvas.width = wrap.clientWidth * 2;
  canvas.height = wrap.clientHeight * 2;
  ctx.scale(2, 2);
  
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  bobbinX = w / 2;
  bobbinY = h / 2;
  bobbinHeight = Math.min(h * 0.55, 300);
  bobbinRadius = Math.min(w * 0.12, 45);
  flangeRadius = bobbinRadius + 18;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function resetGame(){
  wrapProgress = 0;
  totalAngle = 0;
  isWon = false;
  sparkles = [];
  winOverlay.classList.remove('show');
  draw();
}

function getAngle(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = clientX - rect.left - bobbinX;
  const y = clientY - rect.top - bobbinY;
  return Math.atan2(y, x);
}

function isNearBobbin(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = clientX - rect.left - bobbinX;
  const y = clientY - rect.top - bobbinY;
  const dist = Math.sqrt(x*x + y*y);
  return dist < flangeRadius + 30;
}

canvas.addEventListener('touchstart', function(e){
  if(isWon) return;
  e.preventDefault();
  for(const touch of e.changedTouches){
    if(isNearBobbin(touch.clientX, touch.clientY)){
      isTouching = true;
      touchId = touch.identifier;
      touchStartAngle = getAngle(touch.clientX, touch.clientY);
      lastAngle = touchStartAngle;
      break;
    }
  }
}, {passive: false});

canvas.addEventListener('touchmove', function(e){
  if(!isTouching || isWon) return;
  e.preventDefault();
  for(const touch of e.changedTouches){
    if(touch.identifier === touchId){
      const currentAngle = getAngle(touch.clientX, touch.clientY);
      let delta = currentAngle - lastAngle;
      
      if(delta > Math.PI) delta -= Math.PI * 2;
      if(delta < -Math.PI) delta += Math.PI * 2;
      
      totalAngle += delta;
      lastAngle = currentAngle;
      
      const newWraps = Math.floor(Math.abs(totalAngle) / (Math.PI * 2));
      if(newWraps > wrapProgress){
        wrapProgress = Math.min(newWraps, TOTAL_WRAPS);
        if(wrapProgress < TOTAL_WRAPS) spawnSparkles();
      }
      
      if(wrapProgress >= TOTAL_WRAPS && !isWon){
        isWon = true;
        isTouching = false;
        onWin();
      }
      
      draw();
      break;
    }
  }
}, {passive: false});

canvas.addEventListener('touchend', function(e){
  for(const touch of e.changedTouches){
    if(touch.identifier === touchId){
      isTouching = false;
      touchId = null;
    }
  }
});

canvas.addEventListener('touchcancel', function(){
  isTouching = false;
  touchId = null;
});

canvas.addEventListener('mousedown', function(e){
  if(isWon) return;
  if(isNearBobbin(e.clientX, e.clientY)){
    isTouching = true;
    touchStartAngle = getAngle(e.clientX, e.clientY);
    lastAngle = touchStartAngle;
  }
});

canvas.addEventListener('mousemove', function(e){
  if(!isTouching || isWon) return;
  const currentAngle = getAngle(e.clientX, e.clientY);
  let delta = currentAngle - lastAngle;
  if(delta > Math.PI) delta -= Math.PI * 2;
  if(delta < -Math.PI) delta += Math.PI * 2;
  totalAngle += delta;
  lastAngle = currentAngle;
  
  const newWraps = Math.floor(Math.abs(totalAngle) / (Math.PI * 2));
  if(newWraps > wrapProgress){
    wrapProgress = Math.min(newWraps, TOTAL_WRAPS);
    if(wrapProgress < TOTAL_WRAPS) spawnSparkles();
  }
  
  if(wrapProgress >= TOTAL_WRAPS && !isWon){
    isWon = true;
    isTouching = false;
    onWin();
  }
  draw();
});

canvas.addEventListener('mouseup', function(){ isTouching = false; });
canvas.addEventListener('mouseleave', function(){ isTouching = false; });

function spawnSparkles(){
  for(let i=0; i<3; i++){
    const angle = Math.random() * Math.PI * 2;
    const dist = bobbinRadius + Math.random() * 40;
    sparkles.push({
      x: bobbinX + Math.cos(angle) * dist,
      y: bobbinY + Math.sin(angle) * dist,
      vx: (Math.random()-0.5) * 3,
      vy: (Math.random()-0.5) * 3 - 2,
      life: 1,
      size: 2 + Math.random() * 3
    });
  }
}

function updateSparkles(){
  for(const s of sparkles){
    s.x += s.vx;
    s.y += s.vy;
    s.life -= 0.03;
  }
  sparkles = sparkles.filter(s => s.life > 0);
}

function draw(){
  ctx.clearRect(0, 0, wrap.clientWidth, wrap.clientHeight);
  
  const progress = wrapProgress / TOTAL_WRAPS;
  
  ctx.fillStyle = '#8B7355';
  ctx.beginPath();
  ctx.ellipse(bobbinX, bobbinY - bobbinHeight/2, flangeRadius, flangeRadius*0.35, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#A0896C';
  ctx.beginPath();
  ctx.ellipse(bobbinX, bobbinY - bobbinHeight/2, flangeRadius-3, (flangeRadius-3)*0.35, 0, 0, Math.PI*2);
  ctx.fill();
  
  ctx.fillStyle = '#8B7355';
  ctx.beginPath();
  ctx.ellipse(bobbinX, bobbinY + bobbinHeight/2, flangeRadius, flangeRadius*0.35, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#A0896C';
  ctx.beginPath();
  ctx.ellipse(bobbinX, bobbinY + bobbinHeight/2, flangeRadius-3, (flangeRadius-3)*0.35, 0, 0, Math.PI*2);
  ctx.fill();
  
  ctx.fillStyle = '#D4C4A8';
  ctx.fillRect(bobbinX - bobbinRadius, bobbinY - bobbinHeight/2 + 8, bobbinRadius*2, bobbinHeight - 16);
  
  const yarnLayers = Math.floor(progress * 6);
  const yarnColor = '#E8D5B0';
  const yarnHighlight = '#F0E4CC';
  
  for(let layer = 0; layer < yarnLayers; layer++){
    const layerProgress = Math.min(1, (progress * 6) - layer);
    const r = bobbinRadius + 2 + layer * 4;
    const alpha = 0.4 + layerProgress * 0.6;
    
    ctx.strokeStyle = layer % 2 === 0 ? yarnColor : yarnHighlight;
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = alpha;
    
    for(let i = 0; i < 8; i++){
      const y1 = bobbinY - bobbinHeight/2 + 12 + i * (bobbinHeight-24)/8;
      const y2 = bobbinY - bobbinHeight/2 + 12 + (i+1) * (bobbinHeight-24)/8;
      const offsetX = Math.sin(i * 1.2 + layer * 0.8 + totalAngle * 0.3) * 5;
      
      ctx.beginPath();
      ctx.moveTo(bobbinX - r + offsetX, y1);
      ctx.lineTo(bobbinX + r + offsetX, y2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  
  if(isTouching && !isWon){
    const currentR = bobbinRadius + 2 + yarnLayers * 4;
    ctx.strokeStyle = '#D4A84A';
    ctx.lineWidth = 3;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.ellipse(bobbinX, bobbinY, currentR+2, (currentR+2)*0.3, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  updateSparkles();
  for(const s of sparkles){
    ctx.fillStyle = `rgba(212,168,74,${s.life})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();
  }
  
  const barWidth = wrap.clientWidth * 0.7;
  const barHeight = 8;
  const barX = (wrap.clientWidth - barWidth) / 2;
  const barY = wrap.clientHeight - 40;
  
  ctx.fillStyle = '#E8DDD0';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barWidth, barHeight, 4);
  ctx.fill();
  
  const fillGrad = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
  fillGrad.addColorStop(0, '#D4A84A');
  fillGrad.addColorStop(1, '#C88ABC');
  ctx.fillStyle = fillGrad;
  ctx.beginPath();
  ctx.roundRect(barX, barY, barWidth * progress, barHeight, 4);
  ctx.fill();
  
  ctx.fillStyle = '#8A7A6A';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`${wrapProgress} / ${TOTAL_WRAPS} 圈`, bobbinX, barY - 10);
  
  if(!isTouching && !isWon && wrapProgress === 0){
    ctx.fillStyle = '#B0A090';
    ctx.font = '15px system-ui';
    ctx.fillText('👆 按住纱管绕圈', bobbinX, bobbinY + bobbinHeight/2 + 50);
  }
  
  if(isWon) return;
  requestAnimationFrame(draw);
}

function onWin(){
  if(!hasCompletedOnce){
    hasCompletedOnce = true;
    window.parent.postMessage({ type: 'taskComplete', taskId: TASK_ID }, '*');
    winSubtitle.textContent = '✨ 获得 +1 抽卡次数！';
  } else {
    winSubtitle.textContent = '🔄 重玩通关';
  }
  wrapProgress = TOTAL_WRAPS;
  winOverlay.classList.add('show');
  ctx.clearRect(0, 0, wrap.clientWidth, wrap.clientHeight);
  
  ctx.fillStyle = '#8B7355';
  ctx.beginPath();
  ctx.ellipse(bobbinX, bobbinY - bobbinHeight/2, flangeRadius, flangeRadius*0.35, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#8B7355';
  ctx.beginPath();
  ctx.ellipse(bobbinX, bobbinY + bobbinHeight/2, flangeRadius, flangeRadius*0.35, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#D4C4A8';
  ctx.fillRect(bobbinX - bobbinRadius, bobbinY - bobbinHeight/2 + 8, bobbinRadius*2, bobbinHeight - 16);
  
  for(let layer = 0; layer < 6; layer++){
    const r = bobbinRadius + 2 + layer * 4;
    ctx.strokeStyle = layer % 2 === 0 ? '#E8D5B0' : '#F0E4CC';
    ctx.lineWidth = 2.5;
    for(let i = 0; i < 8; i++){
      const y1 = bobbinY - bobbinHeight/2 + 12 + i * (bobbinHeight-24)/8;
      const y2 = bobbinY - bobbinHeight/2 + 12 + (i+1) * (bobbinHeight-24)/8;
      ctx.beginPath();
      ctx.moveTo(bobbinX - r, y1);
      ctx.lineTo(bobbinX + r, y2);
      ctx.stroke();
    }
  }
  
  const barWidth = wrap.clientWidth * 0.7;
  const barX = (wrap.clientWidth - barWidth) / 2;
  const barY = wrap.clientHeight - 40;
  ctx.fillStyle = '#E8DDD0';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barWidth, 8, 4);
  ctx.fill();
  const fillGrad = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
  fillGrad.addColorStop(0, '#D4A84A');
  fillGrad.addColorStop(1, '#C88ABC');
  ctx.fillStyle = fillGrad;
  ctx.beginPath();
  ctx.roundRect(barX, barY, barWidth, 8, 4);
  ctx.fill();
  ctx.fillStyle = '#8A7A6A';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`${TOTAL_WRAPS} / ${TOTAL_WRAPS} 圈`, bobbinX, barY - 10);
}

btnContinue.addEventListener('click', function(){
  resetGame();
  draw();
});

btnBack.addEventListener('click', function(){
  window.parent.postMessage({ type: 'closeGame' }, '*');
});

document.getElementById('resetBtn').addEventListener('click', function(){
  hasCompletedOnce = isTaskAlreadyCompleted(); // ★ 重置时重新读取，而非直接设为false
  resetGame();
  draw();
});

draw();
</script>
</body>
</html>
